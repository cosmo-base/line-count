name: Count TSX Lines Across Repos

on:
  workflow_dispatch:

jobs:
  count-lines:
    runs-on: ubuntu-latest
    steps:
      - name: Install cloc
        run: sudo apt-get install -y cloc

      - name: Fetch and Count
        run: |
          echo "=== 集計を開始します ==="
          TOTAL_LINES=0

          # 1. 【設定】あなたのご自身のGitHubアカウント名を入力してください
          OWNER="cosmo-base"

          # 2. 【設定】集計したいリポジトリ名をスペース区切りで入力してください
          # (除外したいリポジトリはここに書かないだけで除外できます)
          REPOS="library opening member_only kpi-dashboard"
          for REPO in $REPOS; do
            echo "-----------------------------------"
            echo "Checking: $OWNER/$REPO"
            
            # 公開リポジトリを一時クローン
            git clone --depth 1 https://github.com{OWNER}/${REPO}.git temp_repo 2>/dev/null            
            if [ -d "temp_repo" ]; then
              # node_modules などを除外して TSX/TS をカウント
              LINES=$(cloc --include-ext=tsx,ts --not-match-d='(node_modules|dist|build)' --json temp_repo 2>/dev/null | jq '.TypeScript?.code // 0')
              
              if [ "$LINES" -gt 0 ]; then
                echo "-> TSX/TS lines: $LINES"
                TOTAL_LINES=$((TOTAL_LINES + LINES))
              else
                echo "-> TSX/TS files not found or 0 lines."
              fi
              rm -rf temp_repo
            else
              echo "-> [Error] リポジトリが非公開（プライベート）か、名前が間違っているため取得できませんでした。"
            fi
          done

          echo "==================================="
          echo "★全リポジトリのTSX/TS総行数: $TOTAL_LINES 行"
          echo "==================================="
