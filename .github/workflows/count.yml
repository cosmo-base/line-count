name: Count TSX Lines Across Repos

on:
  workflow_dispatch: # ボタンを押して手動で実行できるようにする設定

jobs:
  count-lines:
    runs-on: ubuntu-latest
    steps:
      # 1. 必要なツール（cloc）と GitHub CLI を準備
      - name: Install cloc
        run: sudo apt-get install -y cloc

      # 2. 自分のリポジトリ一覧を取得して、TSXファイルの行数をループ処理で集計
      - name: Fetch and Count
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "=== 集計を開始します ==="
          TOTAL_LINES=0

          # 自分の所有するリポジトリ一覧をJSONで取得 (最大100個まで、フォークは除外)
          # 例：「test-repo」と「old-project」の2つを除外する場合
          REPOS=$(gh api user/repos --paginate -q '.[] | select(.fork == false) | .full_name' | grep -vE 'CosmoBaseBot')

          for REPO in $REPOS; do
            echo "-----------------------------------"
            echo "Checking: $REPO"
            
            # リポジトリを一時フォルダにクローン（高速化のため最新の1コミットのみ取得）
            git clone --depth 1 https://x-access-token:${GH_TOKEN}@://github.com{REPO}.git temp_repo 2>/dev/null
            
            if [ -d "temp_repo" ]; then
              # TSXとTSファイルのみを対象に、コードの実行数（空白・コメント除く）を計測
              LINES=$(cloc --include-ext=tsx,ts --json temp_repo 2>/dev/null | jq '.TypeScript?.code // 0')
              
              if [ "$LINES" -gt 0 ]; then
                echo "-> TSX/TS lines: $LINES"
                TOTAL_LINES=$((TOTAL_LINES + LINES))
              else
                echo "-> TSX/TS files not found or 0 lines."
              fi
              rm -rf temp_repo
            fi
          done

          echo "==================================="
          echo "★全リポジトリのTSX/TS総行数: $TOTAL_LINES 行"
          echo "==================================="
