name: Super Clean Code Counter (NodeJS)

on:
  workflow_dispatch:

jobs:
  count-lines:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Fetch and Count
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            const { execSync } = require('child_process');

            const targets = [
              "cosmo-base/library",
              "cosmo-base/opening",
              "cosmo-base/member_only",
              "cosmo-base/kpi-dashboard",
              "cosmo-base/event_database",
              "FSIFofficial/CosmoBase"
            ];

            // 除外するフォルダ・ファイル
            const ignoreDirs = ['node_modules', 'dist', 'build', '.next', 'out', 'coverage', '.cache', '.vercel', 'public/build', 'static/bundles', '.git'];
            const ignoreFiles = ['.min.js', '.bundle.js', 'pnpm-lock.yaml', 'package-lock.json', 'yarn.lock', '.map'];

            let totals = { ts: 0, js: 0, html: 0, css: 0 };

            function countFileLines(filePath) {
              try {
                const content = fs.readFileSync(filePath, 'utf-8');
                // 空行を除外してカウント
                return content.split('\n').filter(line => line.trim().length > 0).length;
              } catch (e) {
                return 0;
              }
            }

            function walkDir(dir, repoStats) {
              const files = fs.readdirSync(dir);
              for (const file of files) {
                const fullPath = path.join(dir, file);
                const stat = fs.statSync(fullPath);

                if (stat.isDirectory()) {
                  if (ignoreDirs.includes(file)) continue;
                  walkDir(fullPath, repoStats);
                } else if (stat.isFile()) {
                  if (ignoreFiles.some(ext => file.endsWith(ext))) continue;

                  const ext = path.extname(file);
                  const lines = countFileLines(fullPath);

                  if (['.tsx', '.ts'].includes(ext)) repoStats.ts += lines;
                  else if (['.jsx', '.js'].includes(ext)) repoStats.js += lines;
                  else if (ext === '.html') repoStats.html += lines;
                  else if (ext === '.css') repoStats.css += lines;
                }
              }
            }

            console.log("=== 集計を開始します ===");

            for (const target of targets) {
              console.log(`-----------------------------------`);
              console.log(`Checking: ${target}`);
              
              const tempDir = `temp_repo_${Date.now()}`;
              try {
                execSync(`git clone --depth 1 https://github.com{target}.git ${tempDir}`, { stdio: 'ignore' });
                
                let repoStats = { ts: 0, js: 0, html: 0, css: 0 };
                walkDir(tempDir, repoStats);
                
                console.log(`-> TSX/TS: ${repoStats.ts} 行 | JS/JSX: ${repoStats.js} 行 | HTML: ${repoStats.html} 行 | CSS: ${repoStats.css} 行`);
                
                totals.ts += repoStats.ts;
                totals.js += repoStats.js;
                totals.html += repoStats.html;
                totals.css += repoStats.css;
                
                fs.rmSync(tempDir, { recursive: true, force: true });
              } catch (err) {
                console.log(`-> [Error] リポジトリの取得または解析に失敗しました。`);
              }
            }

            const grandTotal = totals.ts + totals.js + totals.html + totals.css;

            console.log("===================================");
            console.log("★全リポジトリの言語別・総合計行数（確定版）★");
            console.log("===================================");
            console.log(` TypeScript (TSX/TS) : ${totals.ts} 行`);
            console.log(` JavaScript (JS/JSX) : ${totals.js} 行`);
            console.log(` HTML                : ${totals.html} 行`);
            console.log(` CSS                 : ${totals.css} 行`);
            console.log("-----------------------------------");
            console.log(` 全言語の総合計行数  : ${grandTotal} 行`);
            console.log("===================================");
