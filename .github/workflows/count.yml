            const fs = require('fs');
            const path = require('path');

            const baseDir = 'workspace_repos';
            if (!fs.existsSync(baseDir)) {
              console.log("エラー: ワークスペースが存在しません。");
              return;
            }

            const ignoreDirs = ['node_modules', 'dist', 'build', '.next', 'out', 'coverage', '.cache', '.vercel', 'public/build', 'static/bundles', '.git'];
            const ignoreFiles = ['.min.js', '.bundle.js', 'pnpm-lock.yaml', 'package-lock.json', 'yarn.lock', '.map'];

            let totals = { ts: 0, js: 0, html: 0, css: 0 };
            let repoResults = [];

            function countFileLines(filePath) {
              try {
                const content = fs.readFileSync(filePath, 'utf-8');
                return content.split('\n').filter(line => line.trim().length > 0).length;
              } catch (e) {
                return 0;
              }
            }

            function walkDir(dir, repoStats) {
              if (!fs.existsSync(dir)) return;
              const files = fs.readdirSync(dir);
              for (const file of files) {
                const fullPath = path.join(dir, file);
                const stat = fs.statSync(fullPath);

                if (stat.isDirectory()) {
                  if (ignoreDirs.includes(file)) continue;
                  walkDir(fullPath, repoStats);
                } else if (stat.isFile()) {
                  if (ignoreFiles.some(ext => file.endsWith(ext))) continue;

                  const ext = path.extname(file);
                  const lines = countFileLines(fullPath);

                  if (['.tsx', '.ts'].includes(ext)) repoStats.ts += lines;
                  else if (['.jsx', '.js'].includes(ext)) repoStats.js += lines;
                  else if (ext === '.html') repoStats.html += lines;
                  else if (ext === '.css') repoStats.css += lines;
                }
              }
            }

            console.log("=== 集計・解析を開始します ===");

            const targets = fs.readdirSync(baseDir);
            for (const repoName of targets) {
              let repoStats = { ts: 0, js: 0, html: 0, css: 0 };
              walkDir(path.join(baseDir, repoName), repoStats);
              
              const repoTotal = repoStats.ts + repoStats.js + repoStats.html + repoStats.css;
              
              repoResults.push({
                name: repoName,
                stats: repoStats,
                total: repoTotal
              });

              // 全体の合計に加算
              totals.ts += repoStats.ts;
              totals.js += repoStats.js;
              totals.html += repoStats.html;
              totals.css += repoStats.css;
            }

            const grandTotal = totals.ts + totals.js + totals.html + totals.css;

            console.log("\n=============================================");
            console.log("📦 リポジトリごとの集計結果");
            console.log("=============================================");
            
            for (const repo of repoResults) {
              console.log(`【 ${repo.name} 】`);
              console.log(`  - TypeScript (TSX/TS) : ${repo.stats.ts.toLocaleString()} 行`);
              console.log(`  - JavaScript (JS/JSX) : ${repo.stats.js.toLocaleString()} 行`);
              console.log(`  - HTML                : ${repo.stats.html.toLocaleString()} 行`);
              console.log(`  - CSS                 : ${repo.stats.css.toLocaleString()} 行`);
              console.log(`  > リポジトリ合計行数  : ${repo.total.toLocaleString()} 行`);
              console.log(`---------------------------------------------`);
            }

            console.log("\n=============================================");
            console.log("🏆 すべてのリポジトリの総合計（確定版）");
            console.log("=============================================");
            
            // 総合計エリアにリポジトリ名とそれぞれの合計行数を並べる
            for (const repo of repoResults) {
              console.log(` 📦 ${repo.name} : ${repo.total.toLocaleString()} 行`);
            }
            
            console.log("---------------------------------------------");
            console.log(` 🎉 全言語の総合計行数  : ${grandTotal.toLocaleString()} 行`);
            console.log("=============================================\n");
