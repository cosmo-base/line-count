name: Super Clean Code Counter (Final)

on:
  workflow_dispatch:

jobs:
  count-lines:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      # 各リポジトリを一時的にダウンロードする場所を作っておく
      - name: Create Workspace
        run: mkdir -p workspace_repos

      # 1. cosmo-base/library のダウンロードと計算
      - name: Checkout library
        uses: actions/checkout@v4
        with:
          repository: 'cosmo-base/library'
          path: 'workspace_repos/library'
          fail-fast: false

      # 2. cosmo-base/opening のダウンロードと計算
      - name: Checkout opening
        uses: actions/checkout@v4
        with:
          repository: 'cosmo-base/opening'
          path: 'workspace_repos/opening'
          fail-fast: false

      # 3. cosmo-base/member_only のダウンロードと計算
      - name: Checkout member_only
        uses: actions/checkout@v4
        with:
          repository: 'cosmo-base/member_only'
          path: 'workspace_repos/member_only'
          fail-fast: false

      # 4. cosmo-base/kpi-dashboard のダウンロードと計算
      - name: Checkout kpi-dashboard
        uses: actions/checkout@v4
        with:
          repository: 'cosmo-base/kpi-dashboard'
          path: 'workspace_repos/kpi-dashboard'
          fail-fast: false

      # 5. cosmo-base/event_database のダウンロードと計算
      - name: Checkout event_database
        uses: actions/checkout@v4
        with:
          repository: 'cosmo-base/event_database'
          path: 'workspace_repos/event_database'
          fail-fast: false

      # 6. FSIFofficial/CosmoBase のダウンロードと計算
      - name: Checkout CosmoBase
        uses: actions/checkout@v4
        with:
          repository: 'FSIFofficial/CosmoBase'
          path: 'workspace_repos/CosmoBase'
          fail-fast: false

      # 安全にダウンロードされたファイルたちをNode.jsで超精密に集計
      - name: Run Count Logic
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');

            const baseDir = 'workspace_repos';
            if (!fs.existsSync(baseDir)) {
              console.log("エラー: ワークスペースが存在しません。");
              return;
            }

            const ignoreDirs = ['node_modules', 'dist', 'build', '.next', 'out', 'coverage', '.cache', '.vercel', 'public/build', 'static/bundles', '.git'];
            const ignoreFiles = ['.min.js', '.bundle.js', 'pnpm-lock.yaml', 'package-lock.json', 'yarn.lock', '.map'];

            let totals = { ts: 0, js: 0, html: 0, css: 0 };

            function countFileLines(filePath) {
              try {
                const content = fs.readFileSync(filePath, 'utf-8');
                return content.split('\n').filter(line => line.trim().length > 0).length;
              } catch (e) {
                return 0;
              }
            }

            function walkDir(dir, repoStats) {
              if (!fs.existsSync(dir)) return;
              const files = fs.readdirSync(dir);
              for (const file of files) {
                const fullPath = path.join(dir, file);
                const stat = fs.statSync(fullPath);

                if (stat.isDirectory()) {
                  if (ignoreDirs.includes(file)) continue;
                  walkDir(fullPath, repoStats);
                } else if (stat.isFile()) {
                  if (ignoreFiles.some(ext => file.endsWith(ext))) continue;

                  const ext = path.extname(file);
                  const lines = countFileLines(fullPath);

                  if (['.tsx', '.ts'].includes(ext)) repoStats.ts += lines;
                  else if (['.jsx', '.js'].includes(ext)) repoStats.js += lines;
                  else if (ext === '.html') repoStats.html += lines;
                  else if (ext === '.css') repoStats.css += lines;
                }
              }
            }

            console.log("=== 集計を開始します ===");

            const targets = fs.readdirSync(baseDir);
            for (const repoName of targets) {
              console.log(`-----------------------------------`);
              console.log(`Analyzing: ${repoName}`);
              
              let repoStats = { ts: 0, js: 0, html: 0, css: 0 };
              walkDir(path.join(baseDir, repoName), repoStats);
              
              console.log(`-> TSX/TS: ${repoStats.ts} 行 | JS/JSX: ${repoStats.js} 行 | HTML: ${repoStats.html} 行 | CSS: ${repoStats.css} 行`);
              
              totals.ts += repoStats.ts;
              totals.js += repoStats.js;
              totals.html += repoStats.html;
              totals.css += repoStats.css;
            }

            const grandTotal = totals.ts + totals.js + totals.html + totals.css;

            console.log("===================================");
            console.log("★全リポジトリの言語別・総合計行数（確定版）★");
            console.log("===================================");
            console.log(` TypeScript (TSX/TS) : ${totals.ts} 行`);
            console.log(` JavaScript (JS/JSX) : ${totals.js} 行`);
            console.log(` HTML                : ${totals.html} 行`);
            console.log(` CSS                 : ${totals.css} 行`);
            console.log("-----------------------------------");
            console.log(` 全言語の総合計行数  : ${grandTotal} 行`);
            console.log("===================================");
