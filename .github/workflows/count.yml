name: Super Clean Code Counter

on:
  workflow_dispatch:

jobs:
  count-lines:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch and Count
        run: |
          echo "=== 集計を開始します（バグ回避版） ==="
          
          TARGETS="cosmo-base/library cosmo-base/opening cosmo-base/member_only cosmo-base/kpi-dashboard cosmo-base/event_database FSIFofficial/CosmoBase"
          
          TOTAL_TSX_TS=0
          TOTAL_JS_JSX=0
          TOTAL_HTML=0
          TOTAL_CSS=0

          for TARGET in $TARGETS; do
            echo "-----------------------------------"
            echo "Checking: $TARGET"
            
            git clone --depth 1 https://github.com/${TARGET}.git temp_repo 2>/dev/null
            
            if [ -d "temp_repo" ]; then
              cd temp_repo
              
              # 1. 不要なフォルダ（.nextやnode_modulesなど）を物理的に削除して判定から完全に排除
              rm -rf node_modules dist build .next out coverage .cache .vercel public/build static/bundles .git 2>/dev/null
              
              # 2. 拡張子ごとに、空白行を含まない「純粋なコード行数」を厳密にカウント
              # (grep . で空行を除外しています)
              TS_LINES=$(find . -type f \( -name "*.tsx" -o -name "*.ts" \) 2>/dev/null | xargs cat 2>/dev/null | grep -c . || echo 0)
              JS_LINES=$(find . -type f \( -name "*.jsx" -o -name "*.js" \) ! -name "*.min.js" 2>/dev/null | xargs cat 2>/dev/null | grep -c . || echo 0)
              HTML_LINES=$(find . -type f -name "*.html" 2>/dev/null | xargs cat 2>/dev/null | grep -c . || echo 0)
              CSS_LINES=$(find . -type f -name "*.css" 2>/dev/null | xargs cat 2>/dev/null | grep -c . || echo 0)

              echo "-> TSX/TS: $TS_LINES 行 | JS/JSX: $JS_LINES 行 | HTML: $HTML_LINES 行 | CSS: $CSS_LINES 行"
              
              TOTAL_TSX_TS=$((TOTAL_TSX_TS + TS_LINES))
              TOTAL_JS_JSX=$((TOTAL_JS_JSX + JS_LINES))
              TOTAL_HTML=$((TOTAL_HTML + HTML_LINES))
              TOTAL_CSS=$((TOTAL_CSS + CSS_LINES))

              cd ..
              rm -rf temp_repo
            else
              echo "-> [Error] リポジトリの取得に失敗しました。"
            fi
          done

          GRAND_TOTAL=$((TOTAL_TSX_TS + TOTAL_JS_JSX + TOTAL_HTML + TOTAL_CSS))

          echo "==================================="
          echo "★全リポジトリの言語別・総合計行数（確定版）★"
          echo "==================================="
          echo " TypeScript (TSX/TS) : $TOTAL_TSX_TS 行"
          echo " JavaScript (JS/JSX) : $TOTAL_JS_JSX 行"
          echo " HTML                : $TOTAL_HTML 行"
          echo " CSS                 : $TOTAL_CSS 行"
          echo "-----------------------------------"
          echo " 全言語の総合計行数  : $GRAND_TOTAL 行"
          echo "==================================="
